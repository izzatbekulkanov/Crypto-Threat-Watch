<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crypto Threat Watch — Admin Panel</title>
    <meta name="description" content="Kiberxavfsizlik xodimlari uchun multi-chain kripto monitoring va audit tizimining boshqaruv paneli.">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080816;
            --card-bg: rgba(20, 20, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-primary: #8b5cf6; /* Violet */
            --accent-secondary: #06b6d4; /* Cyan */
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #3b82f6);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #151030 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px; /* Space for telegram bottom elements */
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ambient Glows */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Typography */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .header {
            text-align: center;
            padding: 12px 0 24px;
            position: relative;
        }

        .header .subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-top: 4px;
            font-weight: 600;
        }

        .header .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--success);
            font-weight: 600;
            margin-top: 10px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        /* Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.1);
        }

        .stat-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:nth-child(1) .stat-val {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:nth-child(2) .stat-val {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:nth-child(3) .stat-val {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 4px;
            border-radius: 12px;
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--accent-gradient);
            color: var(--text-primary);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        /* Search & Filter Section */
        .search-filter-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
            backdrop-filter: blur(16px);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 12px 10px 36px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            width: 14px;
            height: 14px;
        }

        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .filter-chip {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .filter-chip.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.4);
            color: #c084fc;
        }

        .sort-btn {
            margin-left: auto;
            background: transparent;
            border: none;
            color: var(--accent-secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px;
        }

        /* Panel Content */
        .panel {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* List Items */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px;
            backdrop-filter: blur(16px);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .list-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(2px);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .item-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .network-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .net-ton { background: rgba(0, 152, 234, 0.12); color: #0098ea; border: 1px solid rgba(0, 152, 234, 0.2); }
        .net-eth { background: rgba(98, 126, 234, 0.12); color: #627eea; border: 1px solid rgba(98, 126, 234, 0.2); }
        .net-tron { background: rgba(239, 44, 44, 0.12); color: #ef2c2c; border: 1px solid rgba(239, 44, 44, 0.2); }

        .risk-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-low { background: rgba(16, 185, 129, 0.12); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .risk-medium { background: rgba(245, 158, 11, 0.12); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .risk-high { background: rgba(239, 68, 68, 0.12); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .risk-critical { 
            background: rgba(239, 68, 68, 0.2); 
            color: #ff3333; 
            border: 1px solid #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: rgba(239, 68, 68, 1); }
            100% { border-color: rgba(239, 68, 68, 0.4); }
        }

        .address-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 8px 10px;
            font-family: monospace;
            font-size: 11px;
            color: #cbd5e1;
            word-break: break-all;
            user-select: all;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .address-box .copy-btn {
            background: transparent;
            border: none;
            color: var(--accent-secondary);
            font-size: 10px;
            cursor: pointer;
            margin-left: 6px;
        }

        .summary-box {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            border-left: 2px solid var(--accent-primary);
            padding-left: 8px;
        }

        .req-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .admin-badge {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(239, 68, 68, 0.15));
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.1);
        }

        .info-card {
            background: rgba(139, 92, 246, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #c084fc;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <header class="header">
        <h1 id="app-title">🛡 CRYPTO THREAT WATCH</h1>
        <p class="subtitle" id="app-subtitle">Security Command Dashboard</p>
        <div class="status-indicator" id="status-panel">
            <span class="status-dot" id="active-dot"></span>
            <span id="status-text">SYSTEM SECURE</span>
        </div>
    </header>

    <section class="stats-container" id="stats-section">
        <div class="stat-card" id="card-users">
            <div class="stat-val" id="s-users">-</div>
            <div class="stat-label">Users</div>
        </div>
        <div class="stat-card" id="card-queries">
            <div class="stat-val" id="s-queries">-</div>
            <div class="stat-label">Queries</div>
        </div>
        <div class="stat-card" id="card-audits">
            <div class="stat-val" id="s-audits">-</div>
            <div class="stat-label">Audits</div>
        </div>
    </section>

    <nav class="tabs-wrapper" id="navigation-tabs">
        <button class="tab-btn active" id="tab-users-btn" onclick="showTab('users')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            👥 Users
        </button>
        <button class="tab-btn" id="tab-audits-btn" onclick="showTab('audits')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            📋 Audits
        </button>
    </nav>

    <div class="search-filter-box" id="search-filter-controls">
        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search..." oninput="handleSearch()">
        </div>
        <div class="filters-container" id="filter-chips-container">
            <!-- Filter chips will render dynamically based on active tab -->
        </div>
    </div>

    <main>
        <div class="panel active" id="p-users"></div>
        <div class="panel" id="p-audits"></div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let appData = {
            stats: { total_users: 0, total_queries: 0, total_audits: 0 },
            users: [],
            audits: []
        };

        let activeTab = 'users'; // 'users' or 'audits'
        let searchQuery = '';
        
        // Filter states
        let userSortBy = 'queries'; // 'queries', 'name'
        let auditNetworkFilter = 'ALL'; // 'ALL', 'TON', 'ETH', 'TRON'
        let auditRiskFilter = 'ALL'; // 'ALL', 'HIGH', 'MEDIUM', 'LOW'
        let auditSortBy = 'date'; // 'date', 'risk'

        function showTab(name) {
            activeTab = name;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (name === 'users' && i === 0) || (name === 'audits' && i === 1));
            });
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById('p-' + name).classList.add('active');
            
            // Clear search when switching tabs
            document.getElementById('search-input').value = '';
            searchQuery = '';
            
            renderFilters();
            applyFilterAndRender();
        }

        function renderFilters() {
            const container = document.getElementById('filter-chips-container');
            if (activeTab === 'users') {
                container.innerHTML = `
                    <span class="filter-chip \${userSortBy === 'queries' ? 'active' : ''}" onclick="setUserSort('queries')">Sort: Most Queries</span>
                    <span class="filter-chip \${userSortBy === 'name' ? 'active' : ''}" onclick="setUserSort('name')">Sort: Name</span>
                `;
            } else {
                container.innerHTML = `
                    <span class="filter-chip \${auditNetworkFilter === 'ALL' ? 'active' : ''}" onclick="setAuditNetwork('ALL')">All Nets</span>
                    <span class="filter-chip \${auditNetworkFilter === 'TON' ? 'active' : ''}" onclick="setAuditNetwork('TON')">TON</span>
                    <span class="filter-chip \${auditNetworkFilter === 'ETH' ? 'active' : ''}" onclick="setAuditNetwork('ETH')">ETH</span>
                    <span class="filter-chip \${auditNetworkFilter === 'TRON' ? 'active' : ''}" onclick="setAuditNetwork('TRON')">TRON</span>
                    
                    <span style="width: 1px; height: 16px; background: var(--card-border); margin: 0 4px;"></span>
                    
                    <span class="filter-chip \${auditRiskFilter === 'ALL' ? 'active' : ''}" onclick="setAuditRisk('ALL')">All Risks</span>
                    <span class="filter-chip \${auditRiskFilter === 'HIGH' ? 'active' : ''}" onclick="setAuditRisk('HIGH')">High/Crit</span>
                    <span class="filter-chip \${auditRiskFilter === 'MEDIUM' ? 'active' : ''}" onclick="setAuditRisk('MEDIUM')">Medium</span>
                    <span class="filter-chip \${auditRiskFilter === 'LOW' ? 'active' : ''}" onclick="setAuditRisk('LOW')">Low</span>
                    
                    <button class="sort-btn" onclick="toggleAuditSort()">
                        Sort: \${auditSortBy === 'date' ? '📅 Date' : '⚠️ Risk'}
                    </button>
                `;
            }
        }

        function setUserSort(sort) {
            userSortBy = sort;
            renderFilters();
            applyFilterAndRender();
        }

        function setAuditNetwork(net) {
            auditNetworkFilter = net;
            renderFilters();
            applyFilterAndRender();
        }

        function setAuditRisk(risk) {
            auditRiskFilter = risk;
            renderFilters();
            applyFilterAndRender();
        }

        function toggleAuditSort() {
            auditSortBy = auditSortBy === 'date' ? 'risk' : 'date';
            renderFilters();
            applyFilterAndRender();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            applyFilterAndRender();
        }

        function getRiskWeight(level) {
            if (!level) return 0;
            const lvl = level.toUpperCase();
            if (lvl.includes('CRITICAL')) return 4;
            if (lvl.includes('HIGH')) return 3;
            if (lvl.includes('MEDIUM')) return 2;
            if (lvl.includes('LOW')) return 1;
            return 0;
        }

        function getRiskBadgeClass(level) {
            if (!level) return 'risk-low';
            const lvl = level.toUpperCase();
            if (lvl.includes('CRITICAL')) return 'risk-critical';
            if (lvl.includes('HIGH')) return 'risk-high';
            if (lvl.includes('MEDIUM')) return 'risk-medium';
            return 'risk-low';
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = element.innerText;
                element.innerText = 'Copied!';
                setTimeout(() => {
                    element.innerText = originalText;
                }, 1500);
            });
        }

        function loadData() {
            try {
                const hash = window.location.hash.substring(1);
                if (!hash) {
                    document.getElementById('p-users').innerHTML = \`
                        <div class="info-card">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                            <div>Yuklanmoqda... Agar ma'lumotlar ko'rinmasa, Telegram orqali /web buyrug'ini qaytadan yuboring.</div>
                        </div>\`;
                    fetchFromAPI();
                    return;
                }
                const data = JSON.parse(decodeURIComponent(hash));
                appData = data;
                renderStats(data.stats, data.users, data.audits);
                showTab('users');
            } catch(e) {
                fetchFromAPI();
            }
        }

        async function fetchFromAPI() {
            try {
                const base = window.location.origin;
                const [sr, ur, ar] = await Promise.all([
                    fetch(base + '/api/stats'),
                    fetch(base + '/api/users'),
                    fetch(base + '/api/audits'),
                ]);
                appData = {
                    stats: await sr.json(),
                    users: await ur.json(),
                    audits: await ar.json(),
                };
                renderStats(appData.stats, appData.users, appData.audits);
                showTab(activeTab);
            } catch(e) {
                document.getElementById('p-users').innerHTML = \`
                    <div class="empty-state">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        <div>Ulanishda xatolik yuz berdi: \${e.message}</div>
                    </div>\`;
            }
        }

        function renderStats(stats, users, audits) {
            document.getElementById('s-users').textContent = stats.total_users || users.length || 0;
            document.getElementById('s-queries').textContent = stats.total_queries || 0;
            document.getElementById('s-audits').textContent = stats.total_audits || audits.length || 0;
        }

        function applyFilterAndRender() {
            if (activeTab === 'users') {
                let filteredUsers = [...appData.users];
                
                // Apply search
                if (searchQuery) {
                    filteredUsers = filteredUsers.filter(u => 
                        (u.alias && u.alias.toLowerCase().includes(searchQuery)) ||
                        (u.username && u.username.toLowerCase().includes(searchQuery))
                    );
                }
                
                // Apply sort
                if (userSortBy === 'queries') {
                    filteredUsers.sort((a, b) => (b.query_count || 0) - (a.query_count || 0));
                } else if (userSortBy === 'name') {
                    filteredUsers.sort((a, b) => (a.alias || '').localeCompare(b.alias || ''));
                }
                
                renderUsers(filteredUsers);
            } else {
                let filteredAudits = [...appData.audits];
                
                // Apply search
                if (searchQuery) {
                    filteredAudits = filteredAudits.filter(a => 
                        (a.address && a.address.toLowerCase().includes(searchQuery)) ||
                        (a.alias && a.alias.toLowerCase().includes(searchQuery)) ||
                        (a.network && a.network.toLowerCase().includes(searchQuery))
                    );
                }
                
                // Apply network filter
                if (auditNetworkFilter !== 'ALL') {
                    filteredAudits = filteredAudits.filter(a => a.network === auditNetworkFilter);
                }
                
                // Apply risk filter
                if (auditRiskFilter !== 'ALL') {
                    if (auditRiskFilter === 'HIGH') {
                        filteredAudits = filteredAudits.filter(a => {
                            const l = a.risk_level.toUpperCase();
                            return l.includes('HIGH') || l.includes('CRITICAL');
                        });
                    } else if (auditRiskFilter === 'MEDIUM') {
                        filteredAudits = filteredAudits.filter(a => a.risk_level.toUpperCase().includes('MEDIUM'));
                    } else if (auditRiskFilter === 'LOW') {
                        filteredAudits = filteredAudits.filter(a => a.risk_level.toUpperCase().includes('LOW'));
                    }
                }
                
                // Apply sort
                if (auditSortBy === 'date') {
                    filteredAudits.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                } else if (auditSortBy === 'risk') {
                    filteredAudits.sort((a, b) => getRiskWeight(b.risk_level) - getRiskWeight(a.risk_level));
                }
                
                renderAudits(filteredAudits);
            }
        }

        function renderUsers(usersList) {
            const el = document.getElementById('p-users');
            if (!usersList.length) {
                el.innerHTML = \`
                    <div class="empty-state">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <div>Foydalanuvchilar topilmadi</div>
                    </div>\`;
                return;
            }

            el.innerHTML = \`<div class="list-container">\` + usersList.map(u => {
                const dateStr = u.registered_at ? u.registered_at.slice(0, 10) : '—';
                const adminBadge = u.is_admin ? \`<span class="admin-badge">ADMIN</span>\` : '';
                return \`
                    <div class="list-item">
                        <div class="item-row">
                            <span class="item-title">
                                \${u.alias} \${adminBadge}
                            </span>
                            <span class="req-badge">\${u.query_count || 0} reqs</span>
                        </div>
                        <div class="item-row">
                            <span class="item-subtitle">@\${u.username || 'noname'}</span>
                            <span class="item-subtitle">Joined: \${dateStr}</span>
                        </div>
                    </div>
                \`;
            }).join('') + \`</div>\`;
        }

        function renderAudits(auditsList) {
            const el = document.getElementById('p-audits');
            if (!auditsList.length) {
                el.innerHTML = \`
                    <div class="empty-state">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <div>Auditlar topilmadi</div>
                    </div>\`;
                return;
            }

            el.innerHTML = \`<div class="list-container">\` + auditsList.map(a => {
                const dateStr = a.created_at ? a.created_at.slice(0, 16).replace('T', ' ') : '—';
                const riskClass = getRiskBadgeClass(a.risk_level);
                const netClass = 'net-' + a.network.toLowerCase();
                const shortAddress = a.address.length > 20 ? (a.address.slice(0, 12) + '...' + a.address.slice(-10)) : a.address;
                
                return \`
                    <div class="list-item">
                        <div class="item-row">
                            <span class="network-badge \${netClass}">\${a.network}</span>
                            <span class="risk-badge \${riskClass}">\${a.risk_level || '🟢 LOW'}</span>
                        </div>
                        <div class="address-box">
                            <span>\${shortAddress}</span>
                            <button class="copy-btn" onclick="copyToClipboard('\${a.address}', this)">Copy</button>
                        </div>
                        \${a.result_summary ? \`<div class="summary-box">\${a.result_summary}</div>\` : ''}
                        <div class="item-row">
                            <span class="item-subtitle">👤 \${a.alias || '?'}</span>
                            <span class="item-subtitle">📅 \${dateStr}</span>
                        </div>
                    </div>
                \`;
            }).join('') + \`</div>\`;
        }

        // Init
        loadData();
    </script>
</body>
</html>
